name: Create Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_title:
        description: 'Release title'
        required: true
        default: 'Release v1.0.0'
      generate_notes:
        description: 'Generate release notes automatically?'
        type: boolean
        required: false
        default: true
      release_body:
        description: 'Custom description (if checkbox is disabled)'
        required: false
        default: 'Manual release of compiled files.'

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts from Build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          workflow_conclusion: success
          name: build-output-*
          path: ./artifacts
          name_is_regexp: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_title }}
          body: ${{ github.event.inputs.generate_notes == 'true' && '' || github.event.inputs.release_body }}
          generate_release_notes: ${{ github.event.inputs.generate_notes }}
          draft: false
          prerelease: false
          files: ./artifacts/**/*
