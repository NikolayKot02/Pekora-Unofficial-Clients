name: Build All APKs with Apktool

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        version: [ "2017", "2018", "2020", "2021" ]
      fail-fast: false 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and Setup Apktool
      run: |
        mkdir -p apktool_bin
        curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -o apktool_bin/apktool.jar
        echo '#!/bin/bash' > apktool_bin/apktool
        echo 'exec java -Xmx3G -jar "$(dirname "$0")/apktool.jar" "$@"' >> apktool_bin/apktool
        chmod +x apktool_bin/apktool
        echo "$GITHUB_WORKSPACE/apktool_bin" >> $GITHUB_PATH

    # Загрузка официального ресурсного фреймворка Apktool
    - name: Setup Android Framework for Apktool
      run: |
        mkdir -p frameworks
        # Скачиваем официальный стабильный фреймворк из репозитория самого Apktool (API 32+)
        curl -L "https://github.com/iBotPeaches/Apktool/raw/master/brut.androlib/src/main/resources/brut/androlib/android-framework.jar" -o frameworks/framework-res.apk
        
        # Проверяем размер файла (он должен быть в районе ~40-45 МБ)
        FILE_SIZE=$(stat -c%s "frameworks/framework-res.apk")
        if [ "$FILE_SIZE" -gt 10485760 ]; then
          echo "Фреймворк успешно скачан ($FILE_SIZE байт). Регистрируем в Apktool..."
          apktool if frameworks/framework-res.apk
        else
          echo "Критическая ошибка: файл фреймворка битый или не скачался (размер всего $FILE_SIZE байт)."
          exit 1
        fi

    - name: Build APK for Version ${{ matrix.version }}
      run: |
        if [ -d "${{ matrix.version }}" ]; then
          cd "${{ matrix.version }}"
          
          if [ -f "apktool.json" ]; then
            echo "Найдена старая конфигурация apktool.json в папке ${{ matrix.version }}. Переименовываем в apktool.yml..."
            mv apktool.json apktool.yml
          fi
          
          cd ..
          # Собираем APK с использованием зарегистрированного фреймворка
          apktool b --use-aapt2 "${{ matrix.version }}" -o "Korone_${{ matrix.version }}_unsigned.apk"
        else
          echo "Папка ${{ matrix.version }} не найдена, пропускаем."
        fi

    - name: Upload Unsigned APK
      uses: actions/upload-artifact@v4
      with:
        name: Korone-${{ matrix.version }}-Unsigned-APK
        path: Korone_${{ matrix.version }}_unsigned.apk
